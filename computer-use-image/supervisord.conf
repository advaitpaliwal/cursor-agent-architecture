[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset -nolisten tcp
autostart=true
autorestart=true
priority=100
startsecs=0
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb_err.log

[program:x11vnc]
command=/usr/local/bin/start-x11vnc.sh
autostart=true
autorestart=true
priority=200
startsecs=2
startretries=3
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc_err.log

[program:websockify]
command=/usr/local/bin/websockify 6080 localhost:5900
autostart=true
autorestart=true
priority=300
startsecs=1
stdout_logfile=/var/log/supervisor/websockify.log
stderr_logfile=/var/log/supervisor/websockify_err.log

[program:chrome]
command=/usr/local/bin/start-chrome.sh
autostart=true
autorestart=true
priority=400
startsecs=2
stdout_logfile=/var/log/supervisor/chrome.log
stderr_logfile=/var/log/supervisor/chrome_err.log
