# VNC Desktop Environment Playbook
# Shared between public and internal Cursor container images
#
# This playbook installs and configures:
# - TigerVNC server
# - XFCE4 desktop environment
# - noVNC web-based VNC client
# - Google Chrome browser
# - WhiteSur macOS-style theme (GTK, icons, cursors)
# - Cursor logo and branding
# - Required fonts (including macOS fonts and Cascadia Code)
# - polished-renderer (native video renderer for screen recordings)
#
# Usage:
#   ansible-playbook vnc-desktop.yml --connection=local -i localhost,
#
# Variables:
#   vnc_user: User to configure VNC for (default: ubuntu)

---
- name: Install VNC Desktop Environment
  hosts: localhost
  become: true
  vars:
    vnc_user: "{{ lookup('env', 'VNC_USER') | default('ubuntu', true) }}"
    # Appearance for the XFCE top panel (macOS-like menu bar).
    # - light: black foreground (default)
    # - dark: historical white foreground
    anyos_desktop_appearance: "{{ lookup('env', 'ANYOS_DESKTOP_APPEARANCE') | default('light', true) }}"
    # this version is hardcoded in desktop-init.sh, make sure to update it there
    novnc_version: "1.2.0"
    websockify_version: "0.10.0"
    desktop_wallpaper_url: "https://ptht05hbb1ssoooe.public.blob.vercel-storage.com/assets/misc/asset-cc24ca462279ca23250c.jpg"

  tasks:
    # =========================================================================
    # SYSTEM PACKAGES
    # =========================================================================
    - name: Install VNC and desktop environment packages
      apt:
        name:
          # VNC Server
          - tigervnc-standalone-server
          - tigervnc-common
          - tigervnc-tools
          # XFCE4 Desktop Environment
          - xfce4
          - xfce4-terminal
          - xfce4-settings
          - thunar
          # X11 and Display
          - x11-utils
          - x11-xserver-utils
          - xdg-utils
          - xdotool
          - xclip
          - procps
          # D-Bus and accessibility
          - dbus-x11
          - at-spi2-core
          # Applications
          - mousepad
          - seahorse
          # Theming
          - adwaita-icon-theme
          - gnome-themes-extra
          - gnome-keyring
          - plank
          - sassc
          - libglib2.0-dev-bin
          - libxml2-utils
          - dconf-cli
          # Fonts
          - xfonts-base
          - xfonts-terminus
          - fonts-noto
          - fonts-wqy-microhei
          - fonts-droid-fallback
          - fonts-noto-color-emoji
          - fonts-liberation
          - fonts-croscore
          - fonts-cantarell
          - fonts-jetbrains-mono
          # Development libraries (needed for some apps)
          - libx11-dev
          - libxkbfile-dev
          - libsecret-1-dev
          - libgbm-dev
          - libnotify4
          - libnss3
          - libxss1
          # Mesa OpenGL/WebGL software rendering (llvmpipe)
          # Note: Package names changed in Ubuntu 24.04
          - libgl1-mesa-dri
          - libglx-mesa0
          - libgl1
          # Python (for websockify)
          - python3-minimal
          - python3-numpy
          # Build tools (for polished-renderer Rust build)
          - build-essential
          - pkg-config
          - curl
          # FFmpeg libraries (for polished-renderer build and runtime)
          - libavcodec-dev
          - libavformat-dev
          - libavutil-dev
          - libswscale-dev
          - libavfilter-dev
          - libavdevice-dev
          - libfontconfig1-dev
          - libclang-dev
        state: present
        update_cache: true
        install_recommends: false
      environment:
        DEBIAN_FRONTEND: noninteractive

    # =========================================================================
    # GOOGLE CHROME
    # =========================================================================
    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Google Chrome signing key
      shell: |
        wget -qO- https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /etc/apt/keyrings/google-linux-signing.gpg
        chmod a+r /etc/apt/keyrings/google-linux-signing.gpg
      args:
        creates: /etc/apt/keyrings/google-linux-signing.gpg

    - name: Add Google Chrome repository
      copy:
        dest: /etc/apt/sources.list.d/google-chrome.list
        content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-linux-signing.gpg] https://dl.google.com/linux/chrome/deb/ stable main"
        mode: '0644'

    - name: Install Google Chrome
      apt:
        name: google-chrome-stable
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    # Configure Chrome to work in container/VM environments
    # --no-sandbox: Required for unprivileged containers
    # --disable-dev-shm-usage: Use /tmp instead of /dev/shm (often too small in containers)
    # --use-gl=angle --use-angle=swiftshader-webgl: Enable software WebGL via SwiftShader
    #   (This replaces --disable-gpu to allow WebGL to work in VNC/VM environments)
    # --password-store=basic: Avoid gnome-keyring password prompts
    # --no-first-run: Skip first run dialogs
    # --no-default-browser-check: Don't ask to set as default browser
    # --remote-debugging-port=9222: Enable CDP for Playwright to connect to this instance
    # --user-data-dir: Use separate profile to ensure debugging port is always respected
    #                  (Chrome ignores --remote-debugging-port if joining existing instance)
    # --class=google-chrome: Force WMClass so Plank dock recognizes this as the same app
    #                        (Chrome changes WMClass when using custom --user-data-dir)
    # Use replace to patch ALL Exec= lines in the desktop file
    - name: Patch Chrome desktop file for container compatibility
      replace:
        path: /usr/share/applications/google-chrome.desktop
        regexp: 'Exec=/usr/bin/google-chrome-stable(?! --no-sandbox)'
        replace: 'Exec=/usr/bin/google-chrome-stable --no-sandbox --test-type --disable-dev-shm-usage --use-gl=angle --use-angle=swiftshader-webgl --password-store=basic --no-first-run --no-default-browser-check --remote-debugging-port=9222 --user-data-dir=/home/{{ vnc_user }}/.config/google-chrome --class=google-chrome --window-size=1840,1120 --window-position=20,50'
      ignore_errors: true

    # Also create a wrapper script for command-line usage
    # --password-store=basic: Avoid gnome-keyring password prompts
    # --no-first-run: Skip first run dialogs
    # --no-default-browser-check: Don't ask to set as default browser
    # --remote-debugging-port=9222: Enable CDP for Playwright to connect to this instance
    # --use-gl=angle --use-angle=swiftshader-webgl: Enable software WebGL via SwiftShader
    # For HiDPI (4K 2x), add: --force-device-scale-factor=2
    - name: Create Chrome wrapper script
      copy:
        dest: /usr/local/bin/chrome
        mode: '0755'
        content: |
          #!/bin/bash
          # Use a fixed user-data-dir to ensure --remote-debugging-port is always respected
          # (Chrome ignores this flag if joining an existing instance)
          # --class=google-chrome forces WMClass so Plank dock recognizes this as the same app
          # --use-gl=angle --use-angle=swiftshader-webgl enables software WebGL via SwiftShader
          exec /usr/bin/google-chrome-stable --no-sandbox --test-type --disable-dev-shm-usage --use-gl=angle --use-angle=swiftshader-webgl --password-store=basic --no-first-run --no-default-browser-check --remote-debugging-port=9222 --user-data-dir=/home/{{ vnc_user }}/.config/google-chrome --class=google-chrome --window-size=1840,1120 --window-position=20,50 "$@"

    - name: Create google-chrome alias wrapper
      copy:
        dest: /usr/local/bin/google-chrome
        mode: '0755'
        content: |
          #!/bin/bash
          # Use a fixed user-data-dir to ensure --remote-debugging-port is always respected
          # (Chrome ignores this flag if joining an existing instance)
          # --class=google-chrome forces WMClass so Plank dock recognizes this as the same app
          # --use-gl=angle --use-angle=swiftshader-webgl enables software WebGL via SwiftShader
          exec /usr/bin/google-chrome-stable --no-sandbox --test-type --disable-dev-shm-usage --use-gl=angle --use-angle=swiftshader-webgl --password-store=basic --no-first-run --no-default-browser-check --remote-debugging-port=9222 --user-data-dir=/home/{{ vnc_user }}/.config/google-chrome --class=google-chrome --window-size=1840,1120 --window-position=20,50 "$@"

    # Pre-configure Chrome profile to skip all first-run dialogs
    # This creates the necessary config files so Chrome thinks it's already been set up
    - name: Create Chrome config directory for root
      file:
        path: /root/.config/google-chrome/Default
        state: directory
        mode: '0755'

    - name: Create Chrome "First Run" marker file for root
      copy:
        dest: /root/.config/google-chrome/First Run
        content: ""
        mode: '0644'

    - name: Create Chrome Local State for root
      copy:
        dest: /root/.config/google-chrome/Local State
        mode: '0644'
        content: |
          {
            "browser": {
              "default_browser_infobar_last_declined": "99999999999999999",
              "default_browser_setting_enabled": false
            },
            "protocol_handler": {
              "excluded_schemes": {}
            }
          }

    - name: Create Chrome Default Preferences for root
      copy:
        dest: /root/.config/google-chrome/Default/Preferences
        mode: '0644'
        content: |
          {
            "browser": {
              "check_default_browser": false,
              "show_home_button": false
            },
            "distribution": {
              "import_bookmarks": false,
              "import_history": false,
              "import_search_engine": false,
              "make_chrome_default_for_user": false,
              "skip_first_run_ui": true,
              "suppress_first_run_bubble": true,
              "suppress_first_run_default_browser_prompt": true
            },
            "first_run_tabs": [],
            "profile": {
              "default_content_setting_values": {},
              "exit_type": "Normal"
            },
            "signin": {
              "allowed": false
            },
            "sync_promo": {
              "show_on_first_run_allowed": false
            }
          }

    - name: Create Chrome config directory for user
      file:
        path: "/home/{{ vnc_user }}/.config/google-chrome/Default"
        state: directory
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0755'
      when: vnc_user != 'root'

    - name: Create Chrome "First Run" marker file for user
      copy:
        dest: "/home/{{ vnc_user }}/.config/google-chrome/First Run"
        content: ""
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0644'
      when: vnc_user != 'root'

    - name: Create Chrome Local State for user
      copy:
        dest: "/home/{{ vnc_user }}/.config/google-chrome/Local State"
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0644'
        content: |
          {
            "browser": {
              "default_browser_infobar_last_declined": "99999999999999999",
              "default_browser_setting_enabled": false
            },
            "protocol_handler": {
              "excluded_schemes": {}
            }
          }
      when: vnc_user != 'root'

    - name: Create Chrome Default Preferences for user
      copy:
        dest: "/home/{{ vnc_user }}/.config/google-chrome/Default/Preferences"
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0644'
        content: |
          {
            "browser": {
              "check_default_browser": false,
              "show_home_button": false
            },
            "distribution": {
              "import_bookmarks": false,
              "import_history": false,
              "import_search_engine": false,
              "make_chrome_default_for_user": false,
              "skip_first_run_ui": true,
              "suppress_first_run_bubble": true,
              "suppress_first_run_default_browser_prompt": true
            },
            "first_run_tabs": [],
            "profile": {
              "default_content_setting_values": {},
              "exit_type": "Normal"
            },
            "signin": {
              "allowed": false
            },
            "sync_promo": {
              "show_on_first_run_allowed": false
            }
          }
      when: vnc_user != 'root'

    # =========================================================================
    # PLAYWRIGHT CHROME PROFILE (separate profile for CDP debugging)
    # =========================================================================
    - name: Create Playwright Chrome config directory for user
      file:
        path: "/home/{{ vnc_user }}/.config/google-chrome-playwright/Default"
        state: directory
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0755'
      when: vnc_user != 'root'

    - name: Create Playwright Chrome "First Run" marker file for user
      copy:
        dest: "/home/{{ vnc_user }}/.config/google-chrome-playwright/First Run"
        content: ""
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0644'
      when: vnc_user != 'root'

    - name: Create Playwright Chrome Local State for user
      copy:
        dest: "/home/{{ vnc_user }}/.config/google-chrome-playwright/Local State"
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0644'
        content: |
          {
            "browser": {
              "default_browser_infobar_last_declined": "99999999999999999",
              "default_browser_setting_enabled": false
            },
            "protocol_handler": {
              "excluded_schemes": {}
            }
          }
      when: vnc_user != 'root'

    - name: Create Playwright Chrome Default Preferences for user
      copy:
        dest: "/home/{{ vnc_user }}/.config/google-chrome-playwright/Default/Preferences"
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: '0644'
        content: |
          {
            "browser": {
              "check_default_browser": false,
              "show_home_button": false
            },
            "distribution": {
              "import_bookmarks": false,
              "import_history": false,
              "import_search_engine": false,
              "make_chrome_default_for_user": false,
              "skip_first_run_ui": true,
              "suppress_first_run_bubble": true,
              "suppress_first_run_default_browser_prompt": true
            },
            "first_run_tabs": [],
            "profile": {
              "default_content_setting_values": {},
              "exit_type": "Normal"
            },
            "signin": {
              "allowed": false
            },
            "sync_promo": {
              "show_on_first_run_allowed": false
            }
          }
      when: vnc_user != 'root'

    # =========================================================================
    # LOCALE CONFIGURATION
    # =========================================================================
    - name: Ensure en_US.UTF-8 locale exists
      lineinfile:
        path: /etc/locale.gen
        line: "en_US.UTF-8 UTF-8"
        state: present

    - name: Generate locales
      command: locale-gen
      changed_when: false

    # =========================================================================
    # CURSOR LOGO
    # =========================================================================
    - name: Install Cursor logo
      copy:
        src: files/cursor-logo.svg
        dest: /usr/share/pixmaps/cursor-logo.svg
        mode: '0644'

    - name: Install Cursor logo (dark appearance)
      copy:
        src: files/cursor-logo-dark.svg
        dest: /usr/share/pixmaps/cursor-logo-dark.svg
        mode: '0644'

    - name: Create hicolor apps icon directory
      file:
        path: /usr/share/icons/hicolor/24x24/apps
        state: directory
        mode: '0755'

    - name: Install Cursor logo (hicolor icon theme)
      copy:
        src: files/cursor-logo-24.png
        dest: /usr/share/icons/hicolor/24x24/apps/cursor-logo.png
        mode: '0644'

    - name: Install Cursor logo (dark, hicolor icon theme)
      copy:
        src: files/cursor-logo-dark-24.png
        dest: /usr/share/icons/hicolor/24x24/apps/cursor-logo-dark.png
        mode: '0644'

    - name: Update icon cache (hicolor)
      command: gtk-update-icon-cache -f /usr/share/icons/hicolor
      changed_when: false

    # =========================================================================
    # MACOS FONTS
    # =========================================================================
    - name: Create macOS fonts directory
      file:
        path: /usr/share/fonts/truetype/macos
        state: directory
        mode: '0755'

    - name: Install macOS fonts
      copy:
        src: files/fonts/
        dest: /usr/share/fonts/truetype/macos/
        mode: '0644'

    # =========================================================================
    # CASCADIA CODE FONTS
    # =========================================================================
    - name: Download Cascadia Code fonts
      get_url:
        url: https://github.com/microsoft/cascadia-code/releases/download/v2008.25/CascadiaCode-2008.25.zip
        dest: /tmp/cascadia.zip
        mode: '0644'
      register: cascadia_download
      until: cascadia_download is succeeded
      retries: 5
      delay: 10

    - name: Create Cascadia fonts directory
      file:
        path: /usr/share/fonts/truetype/cascadia
        state: directory
        mode: '0755'

    - name: Create temp directory for Cascadia extraction
      file:
        path: /tmp/cascadia
        state: directory
        mode: '0755'

    - name: Extract Cascadia Code fonts
      unarchive:
        src: /tmp/cascadia.zip
        dest: /tmp/cascadia
        remote_src: true

    - name: Install Cascadia Code ttf fonts
      shell: mv /tmp/cascadia/ttf/* /usr/share/fonts/truetype/cascadia/
      changed_when: true

    - name: Clean up Cascadia Code fonts
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/cascadia.zip
        - /tmp/cascadia

    # =========================================================================
    # FONTCONFIG (font substitution for web fonts)
    # =========================================================================
    - name: Configure fontconfig font substitution
      copy:
        dest: /etc/fonts/local.conf
        mode: '0644'
        content: |
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <!-- Arial (and Arial Unicode MS) -> Arimo (from fonts-croscore) -->
            <match><test name="family" compare="eq"><string>Arial</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Arimo</string></edit>
            </match>
            <match><test name="family" compare="eq"><string>Arial Unicode MS</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Arimo</string></edit>
            </match>

            <!-- Helvetica & Helvetica Neue -> Liberation Sans -->
            <match><test name="family" compare="eq"><string>Helvetica</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit>
            </match>
            <match><test name="family" compare="eq"><string>Helvetica Neue</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Liberation Sans</string></edit>
            </match>

            <!-- Times New Roman -> Tinos (from fonts-croscore) -->
            <match><test name="family" compare="eq"><string>Times New Roman</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Tinos</string></edit>
            </match>
            <match><test name="family" compare="eq"><string>Times</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Tinos</string></edit>
            </match>

            <!-- Courier New -> Cousine (from fonts-croscore) -->
            <match><test name="family" compare="eq"><string>Courier New</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Cousine</string></edit>
            </match>
            <match><test name="family" compare="eq"><string>Courier</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Cousine</string></edit>
            </match>

            <!-- Gill Sans -> Cantarell -->
            <match><test name="family" compare="eq"><string>Gill Sans</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Cantarell</string></edit>
            </match>

            <!-- Menlo -> JetBrains Mono -->
            <match><test name="family" compare="eq"><string>Menlo</string></test>
              <edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit>
            </match>

            <!-- Monaco -> JetBrains Mono -->
            <match><test name="family" compare="eq"><string>Monaco</string></test>
              <edit name="family" mode="assign" binding="strong"><string>JetBrains Mono</string></edit>
            </match>

            <!-- Generic system-ui (Blink/Chrome) -> Noto Sans -->
            <match><test name="family" compare="eq"><string>system-ui</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Noto Sans</string></edit>
            </match>

            <!-- -apple-system (Safari/macOS) -> Noto Sans -->
            <match><test name="family" compare="eq"><string>-apple-system</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Noto Sans</string></edit>
            </match>

            <!-- BlinkMacSystemFont -> Noto Sans -->
            <match><test name="family" compare="eq"><string>BlinkMacSystemFont</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Noto Sans</string></edit>
            </match>

            <!-- Segoe UI (Windows) -> Noto Sans -->
            <match><test name="family" compare="eq"><string>Segoe UI</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Noto Sans</string></edit>
            </match>

            <!-- Roboto -> Noto Sans (similar metrics) -->
            <match><test name="family" compare="eq"><string>Roboto</string></test>
              <edit name="family" mode="assign" binding="strong"><string>Noto Sans</string></edit>
            </match>
          </fontconfig>

    # =========================================================================
    # WHITESUR GTK THEME
    # =========================================================================
    - name: Create themes directory
      file:
        path: /usr/share/themes
        state: directory
        mode: '0755'

    - name: Download WhiteSur GTK theme
      get_url:
        url: https://raw.githubusercontent.com/vinceliuice/WhiteSur-gtk-theme/master/release/WhiteSur-Light.tar.xz
        dest: /tmp/whitesur.tar.xz
        mode: '0644'

    - name: Extract WhiteSur GTK theme
      unarchive:
        src: /tmp/whitesur.tar.xz
        dest: /usr/share/themes
        remote_src: true

    - name: Create Plank theme directory
      file:
        path: /usr/share/plank/themes/WhiteSur-Light
        state: directory
        mode: '0755'

    - name: Copy Plank dock theme
      copy:
        src: /usr/share/themes/WhiteSur-Light/plank/dock.theme
        dest: /usr/share/plank/themes/WhiteSur-Light/dock.theme
        remote_src: true
        mode: '0644'

    - name: Clean up WhiteSur GTK theme archive
      file:
        path: /tmp/whitesur.tar.xz
        state: absent

    # =========================================================================
    # WHITESUR ICON THEME
    # =========================================================================
    - name: Download WhiteSur icon theme
      get_url:
        url: https://github.com/vinceliuice/WhiteSur-icon-theme/archive/refs/heads/master.tar.gz
        dest: /tmp/whitesur-icon.tar.gz
        mode: '0644'
      register: whitesur_icon_download
      until: whitesur_icon_download is succeeded
      retries: 5
      delay: 10

    - name: Extract WhiteSur icon theme
      unarchive:
        src: /tmp/whitesur-icon.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install WhiteSur icon theme
      command:
        cmd: ./install.sh -d /usr/share/icons -b
        chdir: /tmp/WhiteSur-icon-theme-master
      changed_when: true

    - name: Clean up WhiteSur icon theme
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/whitesur-icon.tar.gz
        - /tmp/WhiteSur-icon-theme-master

    # =========================================================================
    # WHITESUR CURSOR THEME
    # =========================================================================
    - name: Download WhiteSur cursor theme
      get_url:
        url: https://github.com/vinceliuice/WhiteSur-cursors/archive/refs/heads/master.tar.gz
        dest: /tmp/whitesur-cursor.tar.gz
        mode: '0644'
      register: whitesur_cursor_download
      until: whitesur_cursor_download is succeeded
      retries: 5
      delay: 10

    - name: Extract WhiteSur cursor theme
      unarchive:
        src: /tmp/whitesur-cursor.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install WhiteSur cursor theme
      command:
        cmd: ./install.sh
        chdir: /tmp/WhiteSur-cursors-master
      changed_when: true

    - name: Clean up WhiteSur cursor theme
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/whitesur-cursor.tar.gz
        - /tmp/WhiteSur-cursors-master

    # =========================================================================
    # DESKTOP WALLPAPER
    # =========================================================================
    - name: Create backgrounds directory
      file:
        path: /usr/share/backgrounds
        state: directory
        mode: '0755'

    - name: Download desktop wallpaper
      get_url:
        url: "{{ desktop_wallpaper_url }}"
        dest: /usr/share/backgrounds/macos-wallpaper.png
        mode: '0644'

    # =========================================================================
    # FONT CACHE
    # =========================================================================
    - name: Update font cache
      command: fc-cache --really-force --verbose
      changed_when: false

    # =========================================================================
    # NOVNC INSTALLATION
    # =========================================================================
    - name: Create noVNC directory
      file:
        path: /usr/local/novnc
        state: directory
        mode: '0755'

    - name: Download noVNC
      get_url:
        url: "https://github.com/novnc/noVNC/archive/v{{ novnc_version }}.zip"
        dest: /tmp/novnc.zip
        mode: '0644'
      register: novnc_download
      until: novnc_download is succeeded
      retries: 5
      delay: 10

    - name: Extract noVNC
      unarchive:
        src: /tmp/novnc.zip
        dest: /usr/local/novnc
        remote_src: true

    - name: Create noVNC index.html symlink
      copy:
        src: "/usr/local/novnc/noVNC-{{ novnc_version }}/vnc.html"
        dest: "/usr/local/novnc/noVNC-{{ novnc_version }}/index.html"
        remote_src: true
        mode: '0644'

    - name: Download websockify
      get_url:
        url: "https://github.com/novnc/websockify/archive/v{{ websockify_version }}.zip"
        dest: /tmp/websockify.zip
        mode: '0644'
      register: websockify_download
      until: websockify_download is succeeded
      retries: 5
      delay: 10

    - name: Extract websockify
      unarchive:
        src: /tmp/websockify.zip
        dest: /usr/local/novnc
        remote_src: true

    - name: Create websockify symlink for noVNC
      file:
        src: "/usr/local/novnc/websockify-{{ websockify_version }}"
        dest: "/usr/local/novnc/noVNC-{{ novnc_version }}/utils/websockify"
        state: link

    - name: Fix websockify python path
      replace:
        path: "/usr/local/novnc/websockify-{{ websockify_version }}/run"
        regexp: '^python '
        replace: 'python3 '

    - name: Clean up noVNC and websockify archives
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/novnc.zip
        - /tmp/websockify.zip

    # =========================================================================
    # DIRECTORY SETUP
    # =========================================================================
    - name: Create dbus run directory
      file:
        path: /var/run/dbus
        state: directory
        mode: '0755'

    - name: Create vscode-dev-containers directory
      file:
        path: /usr/local/etc/vscode-dev-containers
        state: directory
        mode: '0755'

    # =========================================================================
    # SCRIPT INSTALLATION
    # =========================================================================
    - name: Install desktop-init.sh script
      copy:
        src: files/desktop-init.sh
        dest: /usr/local/share/desktop-init.sh
        mode: '0755'

    - name: Install set-resolution script
      copy:
        src: files/set-resolution.sh
        dest: /usr/local/bin/set-resolution
        mode: '0755'

    - name: Install AnyOS configuration file
      copy:
        src: files/anyos.conf
        dest: /usr/local/share/anyos.conf
        mode: '0644'

    - name: Install AnyOS setup script
      copy:
        src: files/anyos-setup.sh
        dest: /usr/local/bin/anyos-setup
        mode: '0755'

    # =========================================================================
    # XFWM4 WINDOW DECORATION ASSETS
    # Using standard (1x) assets for 1920x1200 @ 96 DPI.
    # For HiDPI (4K 2x), run: files/install-hidpi-assets.sh
    # =========================================================================

    # =========================================================================
    # XFCE CONFIGURATION (with AnyOS templated values)
    # =========================================================================
    - name: Create temp directory for XFCE config processing
      file:
        path: /tmp/xfce-config-processed
        state: directory
        mode: '0755'

    - name: Copy XFCE config templates to temp
      copy:
        src: files/xfce-config/
        dest: /tmp/xfce-config-processed/
        mode: preserve

    - name: Validate AnyOS desktop appearance
      assert:
        that:
          - anyos_desktop_appearance in ["light", "dark"]
        fail_msg: "Invalid ANYOS_DESKTOP_APPEARANCE={{ anyos_desktop_appearance }} (expected 'light' or 'dark')"

    - name: Select dark-mode XFCE panel config (top nav)
      copy:
        src: /tmp/xfce-config-processed/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.dark.xml
        dest: /tmp/xfce-config-processed/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml
        remote_src: true
        mode: preserve
      when: anyos_desktop_appearance == "dark"

    - name: Select dark-mode GTK CSS (top nav)
      copy:
        src: /tmp/xfce-config-processed/.config/gtk-3.0/gtk.dark.css
        dest: /tmp/xfce-config-processed/.config/gtk-3.0/gtk.css
        remote_src: true
        mode: preserve
      when: anyos_desktop_appearance == "dark"

    - name: Copy AnyOS config to temp for processing
      copy:
        src: files/anyos.conf
        dest: /tmp/anyos.conf
        mode: '0644'

    - name: Copy AnyOS setup script to temp
      copy:
        src: files/anyos-setup.sh
        dest: /tmp/anyos-setup.sh
        mode: '0755'

    - name: Apply AnyOS templated values to XFCE config
      command: /tmp/anyos-setup.sh /tmp/xfce-config-processed
      changed_when: true

    - name: Copy processed XFCE config to root
      copy:
        src: /tmp/xfce-config-processed/
        dest: /root/
        remote_src: true
        mode: preserve

    - name: Copy processed XFCE config to user home
      copy:
        src: /tmp/xfce-config-processed/
        dest: "/home/{{ vnc_user }}/"
        remote_src: true
        owner: "{{ vnc_user }}"
        group: "{{ vnc_user }}"
        mode: preserve
      when: vnc_user != 'root'

    - name: Clean up temp XFCE config
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/xfce-config-processed
        - /tmp/anyos.conf
        - /tmp/anyos-setup.sh

    # =========================================================================
    # POLISHED-RENDERER (native video renderer)
    # High-performance Rust-based video renderer for screen recordings.
    # Used by recording-renderer for the record-screen tool.
    # =========================================================================
    - name: Install Rust for polished-renderer build
      shell: |
        if ! command -v cargo > /dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.83.0
        fi
      args:
        creates: /root/.cargo/bin/cargo
      environment:
        HOME: /root

    - name: Create polished-renderer build directory
      file:
        path: /tmp/polished-renderer-build
        state: directory
        mode: '0755'

    - name: Copy polished-renderer source
      copy:
        src: files/polished-renderer/
        dest: /tmp/polished-renderer-build/
        mode: preserve

    - name: Convert Cargo.toml workspace refs to standalone values
      shell: |
        cd /tmp/polished-renderer-build
        # Remove workspace references
        sed -i '/^edition.workspace/d' Cargo.toml
        sed -i '/^version.workspace/d' Cargo.toml
        sed -i '/^authors.workspace/d' Cargo.toml
        sed -i '/^description.workspace/d' Cargo.toml
        # Add explicit values after [package] - use separate sed commands for each line
        sed -i '/^\[package\]/a edition = "2021"' Cargo.toml
        sed -i '/^edition = "2021"/a version = "0.1.0"' Cargo.toml
        sed -i '/^version = "0.1.0"/a authors = ["Anysphere"]' Cargo.toml
        sed -i '/^authors = \["Anysphere"\]/a description = "High-performance video renderer for screen recordings"' Cargo.toml
        # Add empty [workspace] to make it standalone (use printf for portability)
        printf '\n[workspace]\n' >> Cargo.toml

    - name: Build polished-renderer release binary
      shell: |
        export PATH="/root/.cargo/bin:/usr/local/cargo/bin:$PATH"
        cd /tmp/polished-renderer-build
        cargo build --release
      args:
        creates: /tmp/polished-renderer-build/target/release/polished-renderer
      environment:
        HOME: /root

    - name: Create polished-renderer installation directory
      file:
        path: /opt/cursor/polished-renderer
        state: directory
        mode: '0755'

    - name: Install polished-renderer binary
      copy:
        src: /tmp/polished-renderer-build/target/release/polished-renderer
        dest: /opt/cursor/polished-renderer/polished-renderer
        remote_src: true
        mode: '0755'

    - name: Clean up polished-renderer build directory
      file:
        path: /tmp/polished-renderer-build
        state: absent

    # =========================================================================
    # CURSOR DIRECTORIES
    # =========================================================================
    - name: Create Cursor artifacts directory
      file:
        path: /opt/cursor/artifacts
        state: directory
        mode: '1777'

    - name: Create Cursor recording staging directory
      file:
        path: /opt/cursor/recording-staging
        state: directory
        mode: '1777'

    # =========================================================================
    # CLEANUP
    # =========================================================================
    - name: Clean apt cache
      apt:
        autoclean: true

    - name: Remove apt lists
      file:
        path: /var/lib/apt/lists
        state: absent
      ignore_errors: true

  handlers:
    - name: update font cache
      command: fc-cache --really-force --verbose
