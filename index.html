<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple HTML File Server</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0b1220;
      color: #e5e7eb;
    }
    .card {
      max-width: 640px;
      margin: 24px;
      padding: 24px;
      border-radius: 12px;
      background: #111827;
      border: 1px solid #1f2937;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    h1 { margin-top: 0; }
    code {
      background: #1f2937;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Simple HTML File Server</h1>
    <p>If you can see this page, your server is running.</p>
    <p>Served from: <code>/workspace/index.html</code></p>
  </main>
</body>
</html>
